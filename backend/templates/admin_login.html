<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin_login.css') }}">
</head>
<body>

  <div class="page-center">

    <div class="logo">
      <img src="{{ url_for('static', filename='logo/SecuTrack.png') }}" alt="Logo">
    </div>

    <div class="login-container">
      <h2>Admin Login</h2>
      <p class="subtitle">Secure access to your IoT security system</p>

      <form action="{{url_for('admin_login')}}" method="post">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
      </form>

      <a href="#" class="forgot">Forgot Password?</a>
    </div>
  </div>

<!--______________________Flash messages_______________________-->
<div id="flash-message">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}
</div>

</body>
</html>
